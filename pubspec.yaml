name: ciclox
description: App de reciclaje RAEE – Ciclox
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # HTTP
  dio: ^5.7.0

  # DI
  get_it: ^8.0.2

  # Navegación
  go_router: ^14.6.2

  # Almacenamiento seguro
  flutter_secure_storage: ^9.2.2

  # Manejo de errores funcional
  dartz: ^0.10.1

  # Modelos
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # QR
  qr_flutter: ^4.1.0

  # Imágenes
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Utilidades
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
